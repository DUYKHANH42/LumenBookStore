<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6 font-['Plus_Jakarta_Sans']">
  <div class="max-w-md w-full">
    <!-- Card -->
    <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100 relative overflow-hidden">
      <!-- Background elements -->
      <div
        class="absolute top-0 right-0 w-32 h-32 bg-blue-50/50 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2">
      </div>

      <div class="relative z-10">
        <!-- Header -->
        <div class="mb-10 text-center">
          <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-3xl text-blue-600">lock_open</span>
          </div>
          <h1 class="text-3xl font-black text-slate-800 tracking-tighter mb-2">Quên mật khẩu?</h1>
          <p class="text-slate-400 text-sm font-medium">Nhập email của bạn để nhận mã xác nhận đặt lại mật khẩu.</p>
        </div>

        <!-- Success Message -->
        <div *ngIf="message" class="mb-8 p-6 bg-emerald-50 border border-emerald-100 rounded-3xl animate-fadeIn">
          <div class="flex items-start gap-4">
            <span class="material-symbols-outlined text-emerald-600">check_circle</span>
            <div class="flex-1">
              <p class="text-emerald-900 text-sm font-black mb-2">Yêu cầu thành công!</p>
              <p class="text-emerald-700 text-xs leading-relaxed font-medium mb-4">{{message}}</p>
            </div>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage"
          class="mb-8 p-4 bg-rose-50 border border-rose-100 rounded-2xl text-rose-600 text-xs font-bold flex items-center gap-3 animate-fadeIn">
          <span class="material-symbols-outlined text-lg">error</span>
          {{errorMessage}}
        </div>

        <!-- Form -->
        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Địa chỉ Email</label>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
              <input type="email" formControlName="email"
                class="w-full bg-slate-50 border border-slate-100 text-slate-800 font-bold rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-blue-600 focus:bg-white transition-all shadow-inner"
                placeholder="example@gmail.com" />
            </div>
            <div *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
              class="text-[10px] text-rose-500 font-bold ml-1">
              Vui lòng nhập địa chỉ email hợp lệ.
            </div>
          </div>

          <button type="submit" [disabled]="forgotForm.invalid || isLoading"
            class="w-full h-14 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-blue-600 active:scale-95 transition-all flex items-center justify-center gap-3 disabled:opacity-50 disabled:pointer-events-none">
            <span *ngIf="isLoading"
              class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            {{ isLoading ? 'Đang gửi yêu cầu...' : 'Gửi yêu cầu' }}
          </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-50 text-center">
          <a routerLink="/login"
            class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors inline-flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">west</span> Quay lại đăng nhập
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .animate-fadeIn {
    animation: fadeIn 0.4s ease-out forwards;
  }
</style>
